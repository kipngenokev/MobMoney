apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mobmoney
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mobmoney/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # The browser talks to the transfer-service via the host, so this is the
            # externally reachable URL (e.g. the `minikube service` URL). Override per env.
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://localhost:8080"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mobmoney
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
