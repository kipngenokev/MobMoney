spring:
  application:
    name: transfer-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mobmoney?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:mobmoney}
    password: ${DB_PASSWORD:mobmoney}
    hikari:
      maximum-pool-size: 10
      # Fail fast on a saturated pool rather than blocking a request thread forever.
      connection-timeout: 5000
  jpa:
    hibernate:
      # Schema is owned by Flyway, never by Hibernate auto-DDL.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        # Surface lock acquisition problems quickly instead of hanging on a row lock.
        order_inserts: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

partner-bank:
  base-url: ${PARTNER_BANK_URL:http://localhost:8081}
  max-attempts: 3

security:
  jwt:
    issuer: mobmoney-transfer-service
    ttl-seconds: 3600
    public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}
    private-key: ${JWT_PRIVATE_KEY:classpath:keys/private.pem}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # liveness/readiness groups for Kubernetes
      show-details: when_authorized
  metrics:
    tags:
      application: transfer-service

logging:
  level:
    com.mobmoney: INFO
    org.hibernate.SQL: WARN
