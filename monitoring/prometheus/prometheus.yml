global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: transfer-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["transfer-service:8080"]
        labels:
          application: transfer-service

  - job_name: partner-bank-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["partner-bank-service:8081"]
        labels:
          application: partner-bank-service

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
